name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LuaRocks
        run: sudo apt-get update && sudo apt-get install -y luarocks

      - name: Set up nvim-test
        run: make nvim-test

      - name: Run test suite
        run: make test
